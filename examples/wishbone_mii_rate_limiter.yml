# PHY --------------------------------------------------------------------------
phy       : LiteEthPHYMII
vendor    : xilinx
toolchain : vivado

# Core -------------------------------------------------------------------------
clk_freq               : 100e6
core                   : wishbone
endianness             : big
with_tx_rate_limiter   : true
tx_rate_limiter_rate   : 65536
tx_rate_limiter_burst  : 2048

# SoC --------------------------------------------------------------------------
soc:
    mem_map:
        ethmac: 0x50000000
